<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".publication-abstract-link").forEach(function (link) {
      link.addEventListener("click", function (event) {
        var target = document.querySelector(link.getAttribute("href"));
        if (!target) return;
        event.preventDefault();
        target.classList.toggle("hidden");
        link.setAttribute("aria-expanded", target.classList.contains("hidden") ? "false" : "true");
      });
    });

    var imageLinks = document.querySelectorAll(".publication-image-link");
    if (imageLinks.length) {
      var lightbox = document.createElement("div");
      lightbox.className = "publication-lightbox";
      lightbox.innerHTML = '<button class="publication-lightbox-close" type="button" aria-label="Close image">&times;</button><img alt="">';
      document.body.appendChild(lightbox);

      var lightboxImage = lightbox.querySelector("img");
      var closeLightbox = function () {
        lightbox.classList.remove("is-open");
        lightboxImage.removeAttribute("src");
      };

      imageLinks.forEach(function (link) {
        link.addEventListener("click", function (event) {
          event.preventDefault();
          lightboxImage.setAttribute("src", link.getAttribute("href"));
          lightbox.classList.add("is-open");
        });
      });

      lightbox.addEventListener("click", function (event) {
        if (event.target === lightbox || event.target.classList.contains("publication-lightbox-close")) {
          closeLightbox();
        }
      });

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") closeLightbox();
      });
    }
  });
</script>

<script>
  (function () {
    var storageKey = "bopang_homepage_views_max";

    var parseViews = function (value) {
      var number = parseInt(String(value || "").replace(/[^\d]/g, ""), 10);
      return Number.isFinite(number) ? number : 0;
    };

    var readStoredViews = function () {
      try {
        return parseViews(window.localStorage.getItem(storageKey));
      } catch (error) {
        return 0;
      }
    };

    var writeStoredViews = function (value) {
      try {
        window.localStorage.setItem(storageKey, String(value));
      } catch (error) {
        return;
      }
    };

    var getViewsTarget = function () {
      return document.getElementById("vercount_value_page_pv") || document.getElementById("vercount_value_site_pv") || document.getElementById("busuanzi_value_site_pv");
    };

    var renderStableViews = function () {
      var target = getViewsTarget();
      if (!target) return;

      var floor = parseViews(target.getAttribute("data-view-floor"));
      var current = parseViews(target.textContent);
      var stored = readStoredViews();
      var stable = Math.max(floor, current, stored);

      if (stable > 0) {
        var formatted = stable.toLocaleString("en-US");
        if (target.textContent !== formatted) {
          target.textContent = formatted;
        }
        if (stable > stored) {
          writeStoredViews(stable);
        }
      }
    };

    document.addEventListener("DOMContentLoaded", function () {
      var target = getViewsTarget();
      if (!target) return;

      renderStableViews();

      if ("MutationObserver" in window) {
        var observer = new MutationObserver(renderStableViews);
        observer.observe(target, { childList: true, characterData: true, subtree: true });
      }

      window.setTimeout(renderStableViews, 1200);
      window.setTimeout(renderStableViews, 3500);
    });
  })();
</script>
